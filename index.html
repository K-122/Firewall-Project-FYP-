<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>AI Firewall Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:"Segoe UI"; background:#0b1220; color:#e6edf3; }

/* SIDEBAR */
.sidebar {
    width:220px; height:100vh; position:fixed;
    background:#0f172a; padding:20px;
}
.sidebar a { display:block; padding:10px; color:#94a3b8; cursor:pointer; }
.sidebar a:hover { background:#1e293b; }

/* MAIN */
.main { margin-left:240px; padding:20px; }

/* CARD */
.card {
    background:#111827;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

/* BUTTON */
.btn { padding:10px; border:none; border-radius:6px; cursor:pointer; }
.start { background:#22c55e; }
.stop { background:#ef4444; color:white; }

/* TABLE */
table { width:100%; border-collapse:collapse; }
th, td { padding:12px; border-bottom:1px solid #1f2937; }

/* STATUS */
.ATTACK { color:red; }
.SUSPICIOUS { color:orange; }
.NORMAL { color:lightgreen; }

/* ALERT */
.alert {
    background:#1e293b;
    padding:10px;
    margin-bottom:10px;
    border-left:4px solid red;
}

/* HIDE */
.hidden { display:none; }
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar"id="sidebar">
    <div onclick="toggleSidebar()" style="cursor:pointer; margin-bottom:20px;">☰</div>
<h2>🦈 SHARRK_OS</h2>
<a onclick="showPage('Dashboard')">🖥️<span>Dashboard</span></a>
<a onclick="showPage('Traffic')">📡<span>Traffic Analysis</span></a>
<a onclick="showPage('Incidents')">🚨<span>Incidents</span></a>
</div>

<!-- MAIN -->

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="page">

<h2>AI Firewall Dashboard</h2>

<div class="card">
IP: <span id="deviceIP">Loading...</span><br>
Total: <span id="total">0</span><br>
Attacks: <span id="attacks">0</span>
</div>

<div class="card">
<button onclick="startScan()" class="btn start">Start</button>
<button onclick="stopScan()" class="btn stop">Stop</button>
<p>Status: <span id="status">Idle</span></p>
</div>

<div class="card">
<p>Elapsed: <span id="elapsed">0</span></p>
<div id="logs"></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<div id="alerts"></div>
</div>

</div>

<!-- TRAFFIC -->

<div id="traffic" class="page hidden">
<table>
<tr><th>Time</th><th>IP</th><th>Status</th><th>Score</th></tr>
<tbody id="table"></tbody>
</table>
</div>

<!-- INCIDENTS -->

<div id="incidents" class="page hidden">
<div id="incidentList"></div>
</div>

</div>

<script>

// PAGE SWITCH
function showPage(p){
    document.querySelectorAll(".page").forEach(x=>x.classList.add("hidden"));
    document.getElementById(p).classList.remove("hidden");
}

// DEVICE IP
async function loadIP(){
    try{
        let r=await fetch("https://api.ipify.org?format=json");
        let d=await r.json();
        document.getElementById("deviceIP").innerText=d.ip;
    }catch{
        document.getElementById("deviceIP").innerText="LOCAL";
    }
}
loadIP();

// SCAN
let timer=0, interval;

function startScan(){
    timer=0;
    document.getElementById("status").innerText="Running";

    interval=setInterval(()=>{
        timer++;
        document.getElementById("elapsed").innerText=timer;
        addLog("Scanning...");
    },1000);
}

function stopScan(){
    clearInterval(interval);
    document.getElementById("status").innerText="Stopped";
    addLog("Stopped");
}

function addLog(msg){
    let box=document.getElementById("logs");
    box.innerHTML+=msg+"<br>";
}

// GRAPH
let chart;

async function loadGraph(){
    let r=await fetch("/data");
    let d=await r.json();

    let last=d.slice(-20);
    let labels=last.map(x=>x.time);
    let scores=last.map(x=>x.final);

    if(chart) chart.destroy();

    chart=new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{labels:labels,datasets:[{data:scores}]}
    });
}

// DATA
async function loadData(){
    let r=await fetch("/data");
    let d=await r.json();

    let html="", attack=0;

    d.forEach(x=>{
        if(x.status==="ATTACK") attack++;
        html+=`<tr>
        <td>${x.time}</td>
        <td>${x.ip}</td>
        <td class="${x.status}">${x.status}</td>
        <td>${x.final.toFixed(3)}</td>
        </tr>`;
    });

    document.getElementById("table").innerHTML=html;
    document.getElementById("total").innerText=d.length;
    document.getElementById("attacks").innerText=attack;
}

// ALERTS
async function loadAlerts(){
    let r=await fetch("/incidents");
    let d=await r.json();

    let box=document.getElementById("alerts");
    let list=document.getElementById("incidentList");

    box.innerHTML="";
    list.innerHTML="";

    d.slice(-3).forEach(a=>{
        box.innerHTML+=`<div class="alert">⚠ ${a.ip}</div>`;
    });

    d.forEach(a=>{
        list.innerHTML+=`<div class="alert">${a.ip} - ${a.status}</div>`;
    });
}

// LOOP
setInterval(()=>{
    loadData();
    loadGraph();
    loadAlerts();
},2000);

loadData();
loadGraph();
loadAlerts();

</script>

</body>
</html>
