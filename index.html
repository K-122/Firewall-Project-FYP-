<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>AI Firewall Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:"Segoe UI"; background:#0b1220; color:#e6edf3; }

/* SIDEBAR */
.sidebar {
    width:220px; height:100vh; position:fixed;
    background:#0f172a; padding:20px;
}
.sidebar a { display:block; padding:10px; color:#94a3b8; cursor:pointer; }
.sidebar a:hover { background:#1e293b; }

    .sidebar {
    width: 220px;
    transition: 0.3s;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.sidebar.closed .logo {
    justify-content: center;   /* 🔥 center shark icon */
}

.sidebar.closed {
    width: 70px;
}

.sidebar.closed .text {
 display: none;
}

.main {
    margin-left: 220px;
    padding: 15px 20px; 
    transition: 0.3s;
}

.main.full {
    margin-left: 70px;
}

.page {
    padding-left: 5px;
}

/* hide text when collapsed */
.sidebar.closed a {
    display: flex;
    justify-content: center; 
}

.sidebar a {
    display: flex;
    align-items: center;
    gap: 10px;
}
    
/* MAIN */

/* CARD */
.card {
    background:#111827;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.card h3 {
    margin-bottom: 10px;
    color: #22c55e;
}

.card p {
    margin: 5px 0;
}

/* BUTTON */
.btn { padding:10px; border:none; border-radius:6px; cursor:pointer; }
.start { background:#22c55e; }
.stop { background:#ef4444; color:white; }

/* TABLE */
table { width:100%; border-collapse:collapse; }
th, td { padding:12px; border-bottom:1px solid #1f2937; }
table {
    table-layout: fixed;   
}
th:nth-child(1), td:nth-child(1) { text-align: left; }
th:nth-child(2), td:nth-child(2) { text-align: left; }
th:nth-child(3), td:nth-child(3) { text-align: center; }
th:nth-child(4), td:nth-child(4) { text-align: right; }

th:nth-child(1), td:nth-child(1) { width: 120px; }
th:nth-child(2), td:nth-child(2) { width: 220px; }
th:nth-child(3), td:nth-child(3) { width: 140px; }
th:nth-child(4), td:nth-child(4) { width: 100px; }

td:nth-child(4) {
    font-family: monospace;
}



/* STATUS */
.ATTACK { color:red; }
.SUSPICIOUS { color:orange; }
.NORMAL { color:lightgreen; }

/* ALERT */
.alert {
    background:#1e293b;
    padding:10px;
    margin-bottom:10px;
    border-left:4px solid red;
}

/* HIDE */
.hidden { display:none; }
</style>

</head>

<body>

<div class="sidebar" id="sidebar">

    <!-- TOGGLE -->
    <div onclick="toggleSidebar()" style="cursor:pointer; margin-bottom:20px;">☰</div>

    <!-- LOGO -->
    <div class="logo">
        <span class="icon">🦈</span>
        <span class="text">SHARRK_OS</span>
    </div>

    <!-- MENU -->
    <a onclick="showPage('dashboard')">🖥️ <span class="text">Dashboard</span></a>
    <a onclick="showPage('traffic')">📡 <span class="text">Traffic Analysis</span></a>
    <a onclick="showPage('incidents')">🚨 <span class="text">Incidents</span></a>

</div>

<!-- MAIN -->

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="page">

<h2>AI Firewall Dashboard</h2>

<!-- ===== TOP ROW ===== -->

<div style="display:flex; gap:20px; align-items:stretch;">
<!-- LEFT: IP + STATS -->
<div class="card" style="flex:2;">
    <p><b>IP:</b> <span id="deviceIP">Loading...</span></p>
    <p><b>Total:</b> <span id="total">0</span></p>
    <p><b>Attacks:</b> <span id="attacks">0</span></p>
</div>

<!-- RIGHT: CONTROL -->
<div class="card" style="flex:1; display:flex; flex-direction:column; justify-content:center;">
    <div style="display:flex; gap:10px; margin-bottom:10px;">
        <button onclick="startScan()" class="btn start">Start</button>
        <button onclick="stopScan()" class="btn stop">Stop</button>
    </div>

    <p>Status: <span id="status">Idle</span></p>

</div>

</div>

<!-- GRAPH -->
<div class="card" style="flex:1; max-width:450px;">
    <h3>📊 Live Graph</h3>
    <div style="height:220px;">
        <canvas id="chart"></canvas>
    </div>

</div>

<!-- ALERT -->
<div class="card" style="flex:1;">
    <h3>🚨 Alerts</h3>
    <div id="alerts"></div>
</div>

</div>

<!-- TRAFFIC -->

<div id="traffic" class="page hidden">

<h2>📡 Traffic Analysis</h2>

<!-- ===== SPLIT LAYOUT ===== -->

<div style="display:flex; gap:20px; align-items:flex-start;">

<!-- ===== LEFT: TABLE ===== -->
<div class="card" style="flex:2;">

    <h3>📋 Live Traffic Logs</h3>

    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>IP</th>
                <th>Status</th>
                <th>Score</th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>

</div>

<!-- ===== RIGHT: GRAPH ===== -->
<div class="card" style="flex:1; max-width:400px;">

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>📊 Graph</h3>

        <div>
            <select id="chartType" onchange="changeChartType()">
                <option value="bar">Bar</option>
                <option value="line">Line</option>
                <option value="pie">Pie</option>
                <option value="histogram">Histogram</option>
            </select>

            <button onclick="toggleFullscreen()">⛶</button>
        </div>
    </div>

    <canvas id="trafficChart" style="height:220px;"></canvas>

</div>

</div>

</div>

<!-- INCIDENTS -->

<div id="incidents" class="page hidden">
<div id="incidentList"></div>
</div>

</div>

<script>

// PAGE SWITCH
function showPage(p){
    document.querySelectorAll(".page").forEach(x=>x.classList.add("hidden"));
    document.getElementById(p).classList.remove("hidden");

    if (p === "dashboard") {
        loadGraph();
    }

    if (p === "traffic") {
        loadTrafficGraph();
    }
}

function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("closed");
    document.querySelector(".main").classList.toggle("full");
}

function updateSecurity(score) {
    let percent = Math.round(score * 100);

    document.getElementById("securityBar").style.width = percent + "%";
    document.getElementById("securityText").innerText = percent + "% Secure";
}
    
// DEVICE IP
async function loadIP(){
    try{
        let r=await fetch("https://api.ipify.org?format=json");
        let d=await r.json();
        document.getElementById("deviceIP").innerText=d.ip;
    }catch{
        document.getElementById("deviceIP").innerText="LOCAL";
    }
}
loadIP();

// SCAN
let timer=0, interval;

function startScan(){
    timer=0;
    document.getElementById("status").innerText="Running";

    interval=setInterval(()=>{
        timer++;
        document.getElementById("elapsed").innerText=timer;
        addLog("Scanning...");
    },1000);
}

function stopScan(){
    clearInterval(interval);
    document.getElementById("status").innerText="Stopped";
    addLog("Stopped");
}

function addLog(msg){
    let box=document.getElementById("logs");
    box.innerHTML+=msg+"<br>";
}

// GRAPH
let chart;

async function loadGraph() {
    let res = await fetch("/data");
    let data = await res.json();

    if (!data || data.length === 0) return;

    let last = data.slice(-20);

    let labels = last.map(d => d.time);
    let scores = last.map(d => d.final);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Traffic Score",
                data: scores,
                backgroundColor: "#22c55e"
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
}
    
//Traffic graph
let trafficChart;
let currentType = "bar";

function changeChartType() {
    currentType = document.getElementById("chartType").value;
    loadTrafficGraph();
}

function toggleFullscreen() {
    let card = document.getElementById("trafficChart").closest(".card");
    card.classList.toggle("fullscreen");
    setTimeout(loadTrafficGraph, 300);
}

async function loadTrafficGraph() {
    let res = await fetch("/data");
    let data = await res.json();

    if (!data || data.length === 0) return;

    let labels, scores;

    if (currentType === "histogram") {

        // 🔥 Histogram bins
        let bins = [0, 0, 0, 0, 0];

        data.forEach(d => {
            let s = d.final;
            if (s < 0.2) bins[0]++;
            else if (s < 0.4) bins[1]++;
            else if (s < 0.6) bins[2]++;
            else if (s < 0.8) bins[3]++;
            else bins[4]++;
        });

        labels = ["0-0.2", "0.2-0.4", "0.4-0.6", "0.6-0.8", "0.8-1.0"];
        scores = bins;

    } else {

        // 🔥 Normal graph (last 20)
        let last = data.slice(-20);
        labels = last.map(d => d.time);
        scores = last.map(d => d.final);

    }

    // destroy old chart
    if (trafficChart) trafficChart.destroy();

    // create new chart
    trafficChart = new Chart(document.getElementById("trafficChart"), {
        type: currentType === "histogram" ? "bar" : currentType,
        data: {
            labels: labels,
            datasets: [{
                label: "Traffic Score",
                data: scores,
                backgroundColor: "#22c55e",
                borderColor: "#22c55e",
                fill: currentType === "line"
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            scales: currentType === "pie" ? {} : {
                y: { beginAtZero: true }
            }
        }
    });
}
    
// DATA
async function loadData(){
    let r = await fetch("/data");
    let d = await r.json();

    if (!d || d.length === 0) return;

    let html = "";
    let attack = 0;

    d.forEach(x => {
        if (x.status === "ATTACK") attack++;

        html += `<tr>
        <td>${x.time}</td>
        <td>${x.ip}</td>
        <td class="${x.status}">${x.status}</td>
        <td>${x.final.toFixed(3)}</td>
        </tr>`;
    });

    // ===== SAFE UPDATE =====
    let table = document.getElementById("table");
    if (table) table.innerHTML = html;

    let total = document.getElementById("total");
    let attacks = document.getElementById("attacks");

    if (total) total.innerText = d.length;
    if (attacks) attacks.innerText = attack;

    // ===== SECURITY LEVEL (NEW 🔥) =====
    let securityScore = 1 - (attack / d.length);
    let percent = Math.round(securityScore * 100);

    let bar = document.getElementById("securityBar");
    let text = document.getElementById("securityText");

    if (bar) bar.style.width = percent + "%";
    if (text) text.innerText = percent + "% Secure";

    // ===== SYSTEM LOGS (OPTIONAL) =====
    let logs = document.getElementById("logs");
    if (logs) {
        logs.innerHTML = d.slice(-5).map(x =>
            `${x.time} - ${x.status}`
        ).join("<br>");
    }
}

// ALERTS
async function loadAlerts(){
    let r=await fetch("/incidents");
    let d=await r.json();

    let box=document.getElementById("alerts");
    let list=document.getElementById("incidentList");

    box.innerHTML="";
    list.innerHTML="";

    d.slice(-3).forEach(a=>{
        box.innerHTML+=`<div class="alert">⚠ ${a.ip}</div>`;
    });

    d.forEach(a=>{
        list.innerHTML+=`<div class="alert">${a.ip} - ${a.status}</div>`;
    });
}

// LOOP
setInterval(() => {

    let active = document.querySelector(".page:not(.hidden)");

    loadData();

    if (active && active.id === "dashboard") {
        loadGraph();
    }

    if (active && active.id === "traffic") {
        loadTrafficGraph();
    }

}, 2000);

</script>

</body>
</html>
